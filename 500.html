<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <title>Error 500</title>

  <link rel="icon" type="image/svg+xml" href="assets/icons/logo.svg" />
  <link rel="shortcut icon" href="assets/icons/logo.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/page.css" />
  <link rel="stylesheet" href="css/error.css" />
  <link rel="stylesheet" href="css/footer.css" />
</head>
<body>

  <nav id="navbar">
    <a href="index.html" class="nav-logo">
      <img src="assets/icons/logo.svg" alt="MAS Logo" class="nav-logo-img">
      <span class="nav-logo-text">Mohammad Amin Sadat</span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" class="nav-item">Home</a></li>
      <li><a href="blog.html" class="nav-item">Blog</a></li>
      <li><a href="contact.html" class="nav-item">Contact Me</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main style="display:flex;flex-direction:column;min-height:calc(100vh - var(--nav-height))">

    <div class="error-page reveal">
      <div class="error-card">
        <div class="error-glow"></div>
        <div class="error-corner error-corner--tl"></div>
        <div class="error-corner error-corner--tr"></div>
        <div class="error-corner error-corner--bl"></div>
        <div class="error-corner error-corner--br"></div>

        <p class="error-code" aria-hidden="true">500</p>
        <div class="error-divider"></div>
        <h1 class="error-title">Something went wrong</h1>
        <p class="error-message">
          An unexpected error occurred on the server. It's probably not your fault — 
          I'll look into it. Try again shortly, or reach out if the problem persists.
        </p>
        <div class="error-actions">
          <a href="index.html" class="btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10l9-7 9 7v9a1 1 0 01-1 1h-5a1 1 0 01-1-1v-5a1 1 0 00-1-1h-2a1 1 0 00-1 1v5a1 1 0 01-1 1H4a1 1 0 01-1-1v-9z"/></svg>
            Back Home
          </a>
          <a href="contact.html" class="btn btn--ghost">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            Report Issue
          </a>
        </div>
      </div>
    </div>

  </main>

  <div id="site-footer"></div>
  <script src="js/main.js"></script>

</body>
</html>
