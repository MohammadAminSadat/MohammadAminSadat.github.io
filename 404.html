<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <title>Error 404</title>

  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
  <link rel="shortcut icon" href="assets/icons/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/page.css" />
  <link rel="stylesheet" href="css/error.css" />
  <link rel="stylesheet" href="css/footer.css" />
</head>
<body>

  <nav id="navbar">
    <a href="index.html" class="nav-logo">
      <img src="assets/icons/logo.svg" alt="MAS Logo" class="nav-logo-img">
      <span class="nav-logo-text">Mohammad Amin Sadat</span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" class="nav-item">Home</a></li>
      <li><a href="blog.html" class="nav-item">Blog</a></li>
      <li><a href="contact.html" class="nav-item">Contact Me</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main style="display:flex;flex-direction:column;min-height:calc(100vh - var(--nav-height))">

    <div class="error-page reveal">
      <div class="error-card">
        <div class="error-glow"></div>
        <div class="error-corner error-corner--tl"></div>
        <div class="error-corner error-corner--tr"></div>
        <div class="error-corner error-corner--bl"></div>
        <div class="error-corner error-corner--br"></div>

        <p class="error-code" aria-hidden="true">404</p>
        <div class="error-divider"></div>
        <h1 class="error-title">Page not found</h1>
        <p class="error-message">
          The page you're looking for doesn't exist, has been moved, or the link is broken.
          If you followed a link here, I'd appreciate a heads-up.
        </p>
        <div class="error-actions">
          <a href="index.html" class="btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10l9-7 9 7v9a1 1 0 01-1 1h-5a1 1 0 01-1-1v-5a1 1 0 00-1-1h-2a1 1 0 00-1 1v5a1 1 0 01-1 1H4a1 1 0 01-1-1v-9z"/></svg>
            Back Home
          </a>
          <a href="blog.html" class="btn btn--ghost">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            Visit Blog
          </a>
        </div>
      </div>
    </div>

  </main>

  <div id="site-footer"></div>
  <script src="js/main.js"></script>

</body>
</html>
