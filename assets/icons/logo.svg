<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Tiffany blue glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle inner shadow for depth -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e2a2a"/>
      <stop offset="100%" stop-color="#0d1515"/>
    </radialGradient>
  </defs>

  <!-- Hexagon container (robotic/mechanical feel) -->
  <polygon points="100,8 170,48 170,128 100,168 30,128 30,48"
           fill="url(#bgGrad)" stroke="#0ABFBC" stroke-width="2.5"/>

  <!-- Inner hexagon outline (PCB border feel) -->
  <polygon points="100,18 160,53 160,123 100,158 40,123 40,53"
           fill="none" stroke="#0ABFBC" stroke-width="0.6" opacity="0.3"/>

  <!-- LIDAR sweep arcs (self-driving car sensor) -->
  <g fill="none" stroke="#0ABFBC" opacity="0.35">
    <path d="M 100 88 m -38 0 a 38 38 0 0 1 76 0" stroke-width="1"/>
    <path d="M 100 88 m -28 0 a 28 28 0 0 1 56 0" stroke-width="1"/>
    <path d="M 100 88 m -18 0 a 18 18 0 0 1 36 0" stroke-width="1"/>
  </g>

  <!-- LIDAR scan lines radiating from center point -->
  <g stroke="#0ABFBC" stroke-width="0.7" opacity="0.4">
    <line x1="100" y1="88" x2="62"  y2="60"/>
    <line x1="100" y1="88" x2="72"  y2="52"/>
    <line x1="100" y1="88" x2="100" y2="50"/>
    <line x1="100" y1="88" x2="128" y2="52"/>
    <line x1="100" y1="88" x2="138" y2="60"/>
  </g>

  <!-- LIDAR center dot -->
  <circle cx="100" cy="88" r="3.5" fill="#0ABFBC" filter="url(#glow)"/>
  <circle cx="100" cy="88" r="1.5" fill="white"/>

  <!-- Self-driving car silhouette (below LIDAR) -->
  <g transform="translate(100, 130)" fill="none">
    <!-- Car body -->
    <rect x="-28" y="-10" width="56" height="18" rx="5" fill="#0ABFBC" opacity="0.15" stroke="#0ABFBC" stroke-width="1"/>
    <!-- Roofline -->
    <path d="M -16 -10 L -10 -22 L 10 -22 L 16 -10 Z" fill="#0ABFBC" opacity="0.2" stroke="#0ABFBC" stroke-width="1"/>
    <!-- Wheels -->
    <circle cx="-18" cy="8" r="5" fill="#0d1515" stroke="#0ABFBC" stroke-width="1.2"/>
    <circle cx="18"  cy="8" r="5" fill="#0d1515" stroke="#0ABFBC" stroke-width="1.2"/>
    <!-- Roof sensor box -->
    <rect x="-4" y="-26" width="8" height="4" rx="1" fill="#0ABFBC" opacity="0.7"/>
  </g>

  <!-- MAS initials -->
  <text x="100" y="97"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34"
        font-weight="700"
        text-anchor="middle"
        letter-spacing="3"
        fill="white"
        opacity="0.95">MAS</text>

  <!-- Corner hex bolts (mechanical detail) -->
  <g fill="#0ABFBC" opacity="0.5">
    <polygon points="30,48  36,48  33,53"  />
    <polygon points="170,48 164,48 167,53" />
    <polygon points="30,128 36,128 33,123" />
    <polygon points="170,128 164,128 167,123"/>
  </g>

</svg>
